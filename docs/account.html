<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi cuenta | Anibal Copitan</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111827;
            --text-light: #4b5563;
            --green: #22c55e;
            --green-hover: #16a34a;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        .header-home {
            color: var(--text);
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
        }

        .header-home:hover {
            color: var(--green);
        }

        .user-menu {
            position: relative;
        }

        .user-menu-trigger {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text);
        }

        .user-menu-trigger:hover {
            background: #f3f4f6;
        }

        .user-menu-trigger .avatar-placeholder {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green) 0%, #16a34a 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .user-menu-trigger .chevron {
            font-size: 0.7rem;
            color: var(--text-light);
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.25rem;
            min-width: 200px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            padding: 0.5rem;
            display: none;
            z-index: 200;
        }

        .user-dropdown.open {
            display: block;
        }

        .user-dropdown-email {
            padding: 0.75rem;
            font-size: 0.875rem;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
            word-break: break-all;
        }

        .user-dropdown button {
            width: 100%;
            padding: 0.6rem 0.75rem;
            text-align: left;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text);
            border-radius: 8px;
        }

        .user-dropdown button:hover {
            background: #f3f4f6;
        }

        .user-dropdown .logout {
            color: #dc2626;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .user-card {
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .user-card .avatar-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green) 0%, #16a34a 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .user-card .email {
            font-weight: 600;
            color: var(--text);
            word-break: break-all;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            background: #f9fafb;
            border-radius: 16px;
            border: 1px dashed var(--border);
        }

        .empty-state p {
            color: var(--text-light);
            margin: 0 0 0.5rem;
            font-size: 1rem;
        }

        .empty-state .highlight {
            color: var(--text);
            font-weight: 600;
        }

        .courses-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .courses-section-desc {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: #9ca3af;
            font-size: 0.875rem;
            text-align: center;
        }
    </style>
</head>

<body>

    <header class="app-header">
        <a href="index.html" class="header-home">Inicio</a>
        <div class="user-menu">
            <button type="button" class="user-menu-trigger" id="user-menu-trigger" aria-expanded="false" aria-haspopup="true">
                <span class="avatar-placeholder" id="user-initial">👤</span>
                <span id="user-email-header"></span>
                <span class="chevron" aria-hidden="true">▾</span>
            </button>
            <div class="user-dropdown" id="user-dropdown" role="menu">
                <div class="user-dropdown-email" id="user-dropdown-email"></div>
                <button type="button" class="logout" role="menuitem" id="logout-btn">Cerrar sesión</button>
            </div>
        </div>
    </header>

    <main class="container">
        <h1>Mis cursos</h1>
        <p class="subtitle">Aquí verás solo los cursos que están habilitados para tu correo.</p>

        <div class="user-card">
            <span class="avatar-placeholder" id="user-initial-card">👤</span>
            <span class="email" id="user-email-card"></span>
        </div>

        <div class="empty-state">
            <p class="highlight">Aún no tienes cursos habilitados.</p>
            <p>Si ya pagaste, espera a que lo active por WhatsApp.</p>
        </div>

        <h2 class="courses-section-title">Mis cursos</h2>
        <p class="courses-section-desc">Elige un curso y continúa donde lo dejaste.</p>
        <!-- Aquí puedes añadir más adelante la lista de cursos -->
    </main>

    <footer>
        &copy; 2026 Anibal Copitan.
    </footer>

    <script src="session.js"></script>
    <script>
        (function () {
            "use strict";

            var session = window.getSession && window.getSession();
            if (!session || !session.email) {
                window.location.replace("index.html");
                return;
            }

            function escapeHtml(s) {
                var div = document.createElement("div");
                div.textContent = s;
                return div.innerHTML;
            }

            function initial(str) {
                if (!str) return "?";
                var parts = str.trim().split(/\s+/);
                if (parts.length >= 2) {
                    return (parts[0][0] + parts[1][0]).toUpperCase();
                }
                return str[0].toUpperCase();
            }

            var email = session.email;
            var name = session.name || email;
            var initialLetter = initial(name);

            document.getElementById("user-email-header").textContent = email;
            document.getElementById("user-email-card").textContent = email;
            document.getElementById("user-dropdown-email").textContent = email;
            document.getElementById("user-initial").textContent = initialLetter;
            document.getElementById("user-initial-card").textContent = initialLetter;

            var trigger = document.getElementById("user-menu-trigger");
            var dropdown = document.getElementById("user-dropdown");

            trigger.addEventListener("click", function (e) {
                e.stopPropagation();
                var isOpen = dropdown.classList.toggle("open");
                trigger.setAttribute("aria-expanded", isOpen);
            });

            document.addEventListener("click", function () {
                dropdown.classList.remove("open");
                trigger.setAttribute("aria-expanded", "false");
            });

            document.getElementById("logout-btn").addEventListener("click", function () {
                if (window.clearSession) window.clearSession();
                window.location.href = "index.html";
            });
        })();
    </script>
</body>

</html>
