<style>

}

* {

    padding: 0;
}

    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.payment-container {

}

.header {

}

.header h1 {

}

    background: #f8f9fa;
    border-radius: var(--border-radius);
    margin-bottom: 25px;
}

.product-name {

    display: block;
    margin-bottom: 5px;
}

.product-price {

    color: var(--accent-color);
    font-weight: 700;
}

}

.method-btn {

    background: white;
    border-radius: var(--border-radius);

    flex-direction: column;
    align-items: center;
    gap: 5px;
}

.method-btn:hover {
    border-color: var(--accent-color);
    color: var(--accent-color);
}

.method-btn.active {
    background: var(--accent-color);
    border-color: var(--accent-color);
    color: white;
}

.payment-details {
    text-align: center;
    margin-top: 20px;
}

.qr-container {

    padding: 20px;
    border: 1px dashed #dfe6e9;

}

.qr-container img {
    max-width: 200px;
    width: 100%;
}

.verification-form {

    margin-top: 30px;

}

.form-group {

}

.form-group label {

}

}

.form-group input:focus {

}

    padding: 12px;
    background: var(--primary-color);
    color: white;
    border: none;
    border-radius: var(--border-radius);
    cursor: pointer;
    font-weight: 600;
    transition: var(--transition);
}

.btn-submit:hover {
    background: #000;
}

.btn-submit:disabled {

    cursor: not-allowed;
}

.loading-spinner {

    padding: 40px;
}

#success-msg {

    text-align: center;
    color: #27ae60;

}
